# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # De gemeten lijn in de tegels komt uit historie.json, die hieronder bij
  # elke deploy opnieuw wordt opgehaald. Zonder schema zou die lijn blijven
  # staan op het moment van de laatste push.
  schedule:
    - cron: "*/30 * * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      # Schrijft historie.json in de werkmap, die hieronder mee de artifact in
      # gaat. Bewust niet committen: dat zou elke 30 minuten een commit geven.
      # Het script faalt zacht, dus een onbereikbare InfluxDB houdt de deploy
      # niet tegen -- de pagina laat de lijn dan gewoon weg.
      - name: Historie ophalen
        run: python3 .github/historie.py
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weerstation Nijmegen-West – db11.nl</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <strong>db11.nl</strong>
  <a class="active" href="index.html">Dashboard</a>
  <a href="over.html">Over</a>
  <a href="data.html">Data</a>
</nav>

<main>

<!-- Actuele waardes, historie en verwachting. Gevuld door tegels.js; zonder
     JavaScript blijven deze blokken leeg en werkt de rest van de pagina door.
     De naam staat normaal in het paneel; de kop hieronder is de terugval voor
     als dat paneel niet gebouwd kan worden. -->
<section class="nu" id="nu">
  <div class="nu-kop" id="nu-kop">
    <h1>Weerstation Nijmegen-West</h1>
    <span class="versheid"><span class="puls"></span><span id="versheid-tekst">verbinden…</span></span>
  </div>
  <div id="alles-in-een"></div>
  <div class="tegels" id="tegels"></div>
  <!-- Verborgen zolang er geen lijnen zijn; tegels.js zet dit aan. -->
  <div class="legenda" id="legenda" hidden>
    <span><i></i>gemeten door de sensor</span>
    <span><i class="stippel"></i>verwachting Open-Meteo (regionaal model, geen puntmeting)</span>
  </div>
</section>

<!-- Temperatuur & luchtvochtigheid -->
<!-- Deze panelen hebben in Grafana een eigen timeFrom; from/to in de URL wordt
     genegeerd. Het tijdsbereik volgt uit de panelId:
     temperatuur 2=24u 5=7d, vochtigheid 3=24u 6=7d.
     Druk (4, 7) is er niet: de sensor is een SHT30, die meet geen luchtdruk. -->
<section>
  <h2>Temperatuur & luchtvochtigheid</h2>

  <!-- Temperatuur: 24 uur en 7 dagen -->
  <div class="grid">
    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/q87EBfWGk/temperature-humidity-pressure?orgId=1&var-chipID=esp8266-13493145&timezone=browser&panelId=2&kiosk"></iframe>
    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/q87EBfWGk/temperature-humidity-pressure?orgId=1&var-chipID=esp8266-13493145&timezone=browser&panelId=5&kiosk"></iframe>
  </div>

  <!-- Luchtvochtigheid: 24 uur en 7 dagen -->
  <div class="grid">
    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/q87EBfWGk/temperature-humidity-pressure?orgId=1&var-chipID=esp8266-13493145&timezone=browser&panelId=3&kiosk"></iframe>
    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/q87EBfWGk/temperature-humidity-pressure?orgId=1&var-chipID=esp8266-13493145&timezone=browser&panelId=6&kiosk"></iframe>
  </div>
</section>

<!-- PM2.5 blok -->
<section>
  <h2>PM2.5 (fijnstof)</h2>

  <!-- Twee grote boven -->
  <div class="grid">
    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/GUaL5aZMz/pm-sensors?orgId=1&var-chipID=esp8266-13493145&from=now-7d&to=now&timezone=browser&panelId=12&kiosk"></iframe>
    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/GUaL5aZMz/pm-sensors?orgId=1&var-chipID=esp8266-13493145&from=now-1h&to=now&timezone=browser&panelId=16&kiosk"></iframe>
  </div>

  <!-- Drie kleine eronder -->
  <div class="grid grid-small">
    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/GUaL5aZMz/pm-sensors?orgId=1&var-chipID=esp8266-13493145&from=now-1h&to=now&timezone=browser&panelId=13&kiosk"></iframe>
    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/GUaL5aZMz/pm-sensors?orgId=1&var-chipID=esp8266-13493145&from=now-1h&to=now&timezone=browser&panelId=14&kiosk"></iframe>
    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/GUaL5aZMz/pm-sensors?orgId=1&var-chipID=esp8266-13493145&from=now-1h&to=now&timezone=browser&panelId=15&kiosk"></iframe>
  </div>
</section>

<!-- PM10 blok -->
<section>
  <h2>PM10</h2>

  <!-- Twee grote boven -->
  <div class="grid">
    <!-- PM10 last 12h -->
    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/GUaL5aZMz/pm-sensors?orgId=1&var-chipID=esp8266-13493145&from=now-12h&to=now&timezone=browser&panelId=3&kiosk"></iframe>

    <!-- PM10 moving 24h average over last 7 days -->
    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/GUaL5aZMz/pm-sensors?orgId=1&var-chipID=esp8266-13493145&from=now-7d&to=now&timezone=browser&panelId=11&kiosk"></iframe>
  </div>

  <!-- Drie kleine eronder -->
  <div class="grid grid-small">
    <!-- PM10 last 7 days -->
    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/GUaL5aZMz/pm-sensors?orgId=1&var-chipID=esp8266-13493145&from=now-7d&to=now&timezone=browser&panelId=5&kiosk"></iframe>

    <!-- PM10 last 4 weeks -->
    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/GUaL5aZMz/pm-sensors?orgId=1&var-chipID=esp8266-13493145&from=now-28d&to=now&timezone=browser&panelId=7&kiosk"></iframe>

    <!-- PM10 last year -->
    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/GUaL5aZMz/pm-sensors?orgId=1&var-chipID=esp8266-13493145&from=now-1y&to=now&timezone=browser&panelId=9&kiosk"></iframe>
  </div>
</section>


<!-- Betrouwbaarheid -->
<section>
  <h2>Betrouwbaarheid metingen</h2>
  <iframe class="small"
    src="https://api-rrd.madavi.de:3000/grafana/d-solo/Fk6mw1WGz/wifi-signal?orgId=1&var-chipID=esp8266-13493145&from=now-3d&to=now&timezone=browser&panelId=6&kiosk">
  </iframe>
</section>

<!-- Omgevingssensoren -->
<section>
  <h2>Sensoren in de omgeving</h2>
  <!-- Positie van sensor 94016/94017 volgens data.sensor.community: 51.84171, 5.83883 -->
  <iframe class="map" src="https://maps.sensor.community/#15/51.8417/5.8388"></iframe>
</section>

<footer>
  <a target="_blank"
     href="https://api-rrd.madavi.de:3000/grafana/d/GUaL5aZMz/pm-sensors?var-chipID=esp8266-13493145">
    → Bekijk alle grafieken in Grafana
  </a>
</footer>

</main>

<script src="tegels.js" defer></script>
</body>
</html>
